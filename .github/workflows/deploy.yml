name: Deploy to Hostinger Live

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm ci

      - name: Build Project
        run: npm run build
        env:
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          VITE_RAZORPAY_KEY_ID: ${{ secrets.RAZORPAY_KEY_ID }}

      - name: Deploy React App to Subdomain Directory
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 145.79.211.27
          port: 65002
          username: u442506605
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          source: "dist/"
          target: "domains/zynetylogistics.com/public_html/app/"
          strip_components: 1
          
      - name: Create htaccess for React Router
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 145.79.211.27
          port: 65002
          username: u442506605
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          script: |
            echo "<IfModule mod_rewrite.c>
            RewriteEngine On
            RewriteBase /
            RewriteRule ^index\.html$ - [L]
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteRule . /index.html [L]
            </IfModule>" > domains/zynetylogistics.com/public_html/app/.htaccess

      - name: Ensure Plugin Directory Exists
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 145.79.211.27
          port: 65002
          username: u442506605
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          script: |
            mkdir -p domains/zynetylogistics.com/public_html/wp-content/plugins/zynety-app-plugin

      - name: Deploy Backend Plugin (into plugin folder)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 145.79.211.27
          port: 65002
          username: u442506605
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          source: "zynety-app-plugin.php"
          target: "domains/zynetylogistics.com/public_html/wp-content/plugins/zynety-app-plugin/"

      - name: Activate Plugin & Clear Cache via WP-CLI
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 145.79.211.27
          port: 65002
          username: u442506605
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          script: |
            cd domains/zynetylogistics.com/public_html
            # Activate plugin if WP-CLI is available
            if command -v wp &> /dev/null; then
              wp plugin activate zynety-app-plugin --allow-root || true
              wp rewrite flush --allow-root || true
              wp cache flush --allow-root || true
              wp litespeed-purge all --allow-root || true
            fi
            # Fallback file cache clearing
            rm -rf wp-content/cache/* || true
            echo "Plugin deployed successfully to: wp-content/plugins/zynety-app-plugin/"
